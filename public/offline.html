<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#173b2b" />
    <title>Tennis Tracker Offline</title>
    <style>
      :root {
        color: #151816;
        background: #f7f3ea;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 420px;
        border: 1px solid #ded8ca;
        border-radius: 8px;
        background: #fffdf8;
        padding: 28px;
        box-shadow: 0 24px 70px rgba(40, 38, 29, 0.12);
      }

      p:first-child {
        margin: 0 0 8px;
        color: #d85d34;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #173b2b;
        font-size: 32px;
        line-height: 1;
      }

      p:last-child {
        margin: 16px 0 0;
        color: #687169;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Tennis Tracker</p>
      <h1>You are offline.</h1>
      <p>
        Reopen the tracker after one online visit to use the saved app shell
        during a match.
      </p>
    </main>
  </body>
</html>
